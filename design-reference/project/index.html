<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AI Text Actions — Design Canvas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #efeae0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Segoe UI Variable", sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #1a1a1c;
    }
    #root { height: 100%; }
    @keyframes aiCaretBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes aiSpin { to { transform: rotate(360deg); } }

    /* Scrollbars inside the floating panel — thin, dimmed */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb {
      background: rgba(127,127,127,0.28);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(127,127,127,0.45); }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Buttons reset for our PanelButton */
    button { font-family: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="panel.jsx"></script>
  <script type="text/babel" src="host-email.jsx"></script>
  <script type="text/babel" src="settings.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
